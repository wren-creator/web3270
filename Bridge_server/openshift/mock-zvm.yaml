# Internal-only test fixture (TN3270 mock z/VM). See mock-lpar.yaml for the
# reasoning behind single replica / no Route.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-zvm
  labels:
    app: mock-zvm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-zvm
  template:
    metadata:
      labels:
        app: mock-zvm
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: mock-zvm
          image: mock-zvm:latest
          ports:
            - containerPort: 3271
              name: tn3270
          env:
            - name: MOCK_ZVM_PORT
              value: "3271"
            - name: MOCK_ZVM_SYSID
              value: "ZVMPROD"
            - name: MOCK_ZVM_VMID
              value: "ZVMSYS1"
            - name: MOCK_ZVM_LU
              value: "ZVMLU01"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: mock-zvm
  labels:
    app: mock-zvm
spec:
  selector:
    app: mock-zvm
  ports:
    - name: tn3270
      port: 3271
      targetPort: 3271
