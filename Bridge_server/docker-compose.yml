version: "3.9"

services:
  tn3270-bridge:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    # ── Or use a pre-built image once you push to a registry:
    # image: your-registry/tn3270-bridge:latest

    container_name: tn3270-bridge

    restart: unless-stopped

    # ── Port mapping ───────────────────────────────────────────────
    # Format: "HOST_PORT:CONTAINER_PORT"
    # Change the HOST_PORT if 8080 is already taken on your machine.
    # The CONTAINER_PORT must match BRIDGE_PORT below.
    #
    # The bridge connects OUT to mainframe ports (:23, :992, etc.)
    # Those are outbound — no port mapping required for them.
    ports:
      - "8080:8080"       # WebSocket bridge  (browser → bridge)
      # - "8443:8443"     # Uncomment if you add TLS on the bridge leg too

    # ── Environment variables ──────────────────────────────────────
    # All mainframe host/port values live here — edit to match your LPARs.
    # Anything not set here falls back to the defaults in config.js.
    environment:
      # Bridge listener
      BRIDGE_PORT: "8080"
      LOG_LEVEL: "info"              # debug | info | warn | error

      # TLS verification for mainframe connections
      # Set to "false" only if your mainframe uses a self-signed cert
      BRIDGE_VERIFY_TLS: "true"

      # Idle socket timeout (ms). 0 = disabled.
      BRIDGE_SOCKET_TIMEOUT_MS: "300000"

      # Max concurrent sessions
      BRIDGE_MAX_SESSIONS: "50"

      # ── LPAR profiles ────────────────────────────────────────────
      # Each profile has its own HOST and PORT.
      # Use :992 + TLS=true for encrypted connections (recommended).
      # Use :23  + TLS=false for plain TN3270.

      VM01: "10.80.7.136"
      PROD01_PORT: "2323"
      PROD01_TLS:  "true"
      PROD01_LU:   ""                # Leave blank to let host assign

      VM02:  "10.80.7.214"
      DEV02_PORT:  "2323"
      DEV02_TLS:   "true"

      VM03:   "10.80.7.137"
      QA01_PORT:   "23"
      QA01_TLS:    "true"

      # Default terminal model and EBCDIC code page
      DEFAULT_MODEL:    "3278-2"     # 3278-2=80x24, 3278-5=132x27
      DEFAULT_CODEPAGE: "37"         # 37=US, 500=Intl, 285=UK

    # ── Secrets / certs (optional) ─────────────────────────────────
    # If your mainframe requires client certificate auth, mount the
    # cert files here rather than baking them into the image.
    #
    # volumes:
    #   - ./certs/client.crt:/certs/client.crt:ro
    #   - ./certs/client.key:/certs/client.key:ro
    #   - ./certs/ca-chain.crt:/certs/ca-chain.crt:ro

    # ── Networking ─────────────────────────────────────────────────
    networks:
      - tn3270-net

    # ── Resource limits ────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
        reservations:
          memory: 64M

networks:
  tn3270-net:
    driver: bridge
